<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - LICOR DOS PRIMOS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">🍷 <span>LICOR DOS PRIMOS</span></div>
            <a href="index.html" class="nav-back">← Voltar ao Site</a>
        </nav>
    </header>

    <div class="admin-container">
        <!-- Formulário de Login -->
        <div class="login-form" id="login-form">
            <h2>🔐 Login Admin</h2>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="admin-email" placeholder="teste@teste.com">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="admin-password" placeholder="teste123">
            </div>
            <div class="form-group security-key-group">
                <label>Chave de Segurança:</label>
                <input type="password" id="security-key" placeholder="Cole sua chave de segurança">
                <button type="button" class="toggle-key" onclick="toggleSecurityKey()">👁️</button>
            </div>
            <button class="btn-login" onclick="fazerLogin()">Entrar</button>
            <p class="error-message" id="login-error">Credenciais invalidas ou chave incorreta</p>
        </div>

        <!-- Painel Admin -->
        <div class="admin-panel hidden" id="admin-panel">
            <h2>📦 Gerenciar Licores</h2>
            <p style="text-align: center; color: var(--text-muted);">Adicione, edite ou remova licores e controle o estoque</p>

            <button class="btn-add" onclick="abrirModalAdicionar()">➕ Adicionar Novo Licor</button>

            <div class="stock-grid" id="stock-grid"></div>
            <button class="btn-save" onclick="salvarEstoque()">💾 Salvar Estoque</button>
            <p class="success-message" id="save-success">✅ Estoque salvo com sucesso!</p>
            <button class="btn-logout" onclick="fazerLogout()">🚪 Sair</button>
        </div>
    </div>

    <!-- Modal Adicionar/Editar -->
    <div class="modal-form" id="modal-form" onclick="fecharModalFormOnClick(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="btn-fechar-x" onclick="fecharModalForm()">X</button>
            <h2 id="modal-titulo">➕ Adicionar Licor</h2>
            <input type="hidden" id="edit-id">

            <div class="form-group">
                <label>Nome do Licor:</label>
                <input type="text" id="input-nome" placeholder="Ex: Licor de Chocolate">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Volume:</label>
                    <input type="text" id="input-volume" placeholder="Ex: 500ml">
                </div>
                <div class="form-group">
                    <label>Preço (R$):</label>
                    <input type="number" id="input-preco" placeholder="Ex: 49.90" step="0.01" min="0">
                </div>
            </div>

            <div class="form-group">
                <label>Descrição:</label>
                <textarea id="input-descricao" placeholder="Descrição do licor..."></textarea>
            </div>

            <div class="form-group">
                <label>Foto do Licor:</label>
                <div class="image-preview" id="image-preview">
                    <div class="placeholder">
                        <span>📷</span>
                        <p>Clique ou toque para adicionar foto</p>
                    </div>
                </div>
                <input type="file" id="input-foto" accept="image/*">
                <button type="button" class="btn-limpar-foto" onclick="limparFoto()">🗑️ Limpar Foto</button>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Emoji (opcional):</label>
                    <input type="text" id="input-emoji" placeholder="Ex: 🍫">
                </div>
                <div class="form-group">
                    <label>Quantidade:</label>
                    <input type="number" id="input-quantidade" placeholder="10" min="0">
                </div>
            </div>

            <button class="btn-save" onclick="salvarLicor()">💾 Salvar</button>
            <button class="btn-fechar-modal" onclick="fecharModalForm()">Cancelar</button>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
